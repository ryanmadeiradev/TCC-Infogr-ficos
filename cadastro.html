<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Plataforma AudiblEye: Infográficos assistivos com descrição em áudio para acessibilidade.">
    <title>Cadastro de Professor</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container-principal container-login">
        <h1>Cadastrar Novo Professor</h1>
        <form action="/cadastro" method="POST" class="login-form">
            <div class="form-group">
                <label for="usuario">Usuário (Nome Completo):</label>
                <input type="text" id="usuario" name="usuario" class="form-input" required>
            </div>
            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" class="form-input" required>
            </div>
            <div class="form-group">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" class="form-input" required>
            </div>
            <button type="submit" class="btn-submit">Cadastrar</button>
        </form>
        <p style="margin-top: 15px;"><a href="/login">Já tem uma conta? Faça login</a></p>
    </div>
</body>
</html>
